# Kitty Terminal Configuration

# Font
font_family JetBrainsMono Nerd Font
font_size 14.0

# Colors
foreground #BBBBBB
background #2B2B2B

color0 #000000
color1 #F0524F
color2 #5C962C
color3 #A68A0D
color4 #3993D4
color5 #A771BF
color6 #00A3A3
color7 #808080
color8 #595959
color9 #FF4050
color10 #4FC414
color11 #E5BF00
color12 #1FB0FF
color13 #ED7EED
color14 #00E5E5
color15 #FFFFFF

# Window
window_padding_width 10
macos_option_as_alt both

# Tab bar
tab_bar_style powerline
tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_background #202225

active_tab_background #2B2B2B
active_tab_foreground #BBBBBB
active_tab_font_style bold

inactive_tab_background #202225
inactive_tab_foreground #9A9A9A
inactive_tab_font_style normal

tab_separator "  "
tab_title_template "{index}:{title}"

# ─────────────────────────────────────────────────────────────
# Keybindings
# ─────────────────────────────────────────────────────────────

# Word jumps
map alt+right send_text all \x1bF
map alt+left send_text all \x1bB

# Search
map cmd+f launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Navi integration
map ctrl+s>c kitten navi_select.py

# Kubernetes context popup
map ctrl+s>g launch --type=overlay --cwd=current --keep-focus kube-context-popup

# Direct tab jumps
map ctrl+s>1 goto_tab 1
map ctrl+s>2 goto_tab 2
map ctrl+s>3 goto_tab 3
map ctrl+s>4 goto_tab 4
map ctrl+s>5 goto_tab 5
map ctrl+s>6 goto_tab 6
map ctrl+s>7 goto_tab 7
map ctrl+s>8 goto_tab 8
map ctrl+s>9 goto_tab 9

# Tab navigation
map cmd+right next_tab
map cmd+left previous_tab
map ctrl+s>n set_tab_title

# Splits (tmux-like)
map ctrl+s>- launch --location=hsplit --cwd=current
map ctrl+s>\ launch --location=vsplit --cwd=current

# Tab/window management
map ctrl+s>t launch --type=tab --cwd=current
map ctrl+s>w close_tab
map ctrl+s>q close_window

# Reload config
map ctrl+s>r load_config_file

# Pane navigation (hjkl)
map ctrl+s>h neighboring_window left
map ctrl+s>j neighboring_window down
map ctrl+s>k neighboring_window up
map ctrl+s>l neighboring_window right

# Pane resizing
map ctrl+s>H resize_window narrower 3
map ctrl+s>L resize_window wider 3
map ctrl+s>J resize_window taller 3
map ctrl+s>K resize_window shorter 3
