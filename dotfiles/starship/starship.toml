# Starship Configuration

add_newline = false

format = """$directory$nix_shell$git_branch$git_status$golang$kubernetes${custom.tm}$cmd_duration$line_break$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[directory]
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"
use_os_path_sep = true

[git_branch]
format = '[\[[$symbol$branch]($style)\]]'
symbol = "🌱 "

[golang]
format = '[\[[$symbol($version)]($style)\]]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[nix_shell]
format = '[\[[nix-shell](bold blue)\]]'

[kubernetes]
format = '[\[[$cluster:$context](dimmed green)\]]'
disabled = false

[cmd_duration]
min_time = 2000
format = '[\[[⏱ $duration]($style)\]]'

[custom.tm]
command = "tm-current-task"
when = "tm-current-task >/dev/null 2>&1"
format = '[\[[$output]($style)\]]'
style = "bold green"
disabled = false
